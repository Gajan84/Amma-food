<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAnRhV_QMwdQO8es4MXwvOIxLu-1ZybFGs",
    authDomain: "like-8e61e.firebaseapp.com",
    projectId: "like-8e61e",
    storageBucket: "like-8e61e.firebasestorage.app",
    messagingSenderId: "200487031216",
    appId: "1:200487031216:web:032e996a75c8a8018cc675"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window.fbGet    = async (k) => { try{ const s=await getDoc(doc(db,'appdata',k)); return s.exists()?{value:s.data().value}:null; }catch(e){return null;} };
  window.fbSet    = async (k,v) => { try{ await setDoc(doc(db,'appdata',k),{value:v,updatedAt:new Date().toISOString()}); return true; }catch(e){return false;} };
  window.fbListen = (k,cb) => onSnapshot(doc(db,'appdata',k),(s)=>{ if(s.exists()) cb(s.data().value); });
  window.firebaseReady = true;
  document.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
:root {
  --brown:#6B4C1E; --brown-lt:#8B6530;
  --beige:#F2E8D5; --beige-dark:#E0CBA8; --beige-deep:#C9AD80;
  --card:#EDE0C8; --card2:#E5D5B0;
  --gold:#A0720A; --gold-lt:#C49020;
  --text:#3D2B0E; --text-dim:rgba(61,43,14,0.6);
  --border:rgba(107,76,30,0.22);
  --green:#25D366; --green-dk:#1a9e4a;
  --orange:#E65100; --red:#B71C1C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Lato',sans-serif;
  background:var(--beige);
  color:var(--text);
  min-height:100vh;
  padding-bottom:80px;
}

/* ── TOP BAR ── */
.top-bar{
  background:var(--brown);
  padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.top-bar h1{ font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:var(--beige); }
.top-bar .sub{ font-size:10px; color:var(--beige-deep); letter-spacing:2px; text-transform:uppercase; }
.live-dot{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:#4CAF50; font-weight:700; }
.live-dot::before{ content:''; width:8px; height:8px; border-radius:50%; background:#4CAF50; animation:pulse 1.5s infinite; }
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}

/* ── DAY SELECTOR ── */
.day-bar{
  background:var(--beige-dark);
  padding:10px 14px;
  display:flex; gap:8px; overflow-x:auto;
  border-bottom:2px solid var(--beige-deep);
}
.day-btn{
  padding:7px 16px; border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--beige); color:var(--text-dim);
  font-size:12px; font-weight:700; cursor:pointer;
  white-space:nowrap; transition:all 0.2s; font-family:'Lato',sans-serif;
}
.day-btn.active{ background:var(--brown); color:var(--beige); border-color:var(--brown); }
.day-btn .cnt{
  display:inline-block; background:rgba(255,255,255,0.3);
  font-size:10px; padding:1px 5px; border-radius:8px; margin-left:4px;
}

/* ── SUMMARY BAR ── */
.summary-bar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.sum-pill{
  display:flex; align-items:center; gap:5px;
  background:var(--beige); border:1px solid var(--border);
  border-radius:14px; padding:5px 12px; font-size:12px; font-weight:700;
}
.btn-maps-all{
  margin-left:auto; background:#1565C0; color:white;
  border:none; padding:7px 14px; border-radius:8px;
  font-size:12px; font-weight:700; cursor:pointer; font-family:'Lato',sans-serif;
}
.btn-maps-all:active{ opacity:0.8; }

/* ── STOPS ── */
.stops-wrap{ padding:12px 12px 20px; }

.stop{
  display:flex; gap:10px; margin-bottom:14px; position:relative;
}
.stop:not(:last-child)::after{
  content:''; position:absolute; left:19px; top:42px;
  width:2px; height:calc(100% - 4px);
  background:repeating-linear-gradient(to bottom,var(--beige-deep) 0,var(--beige-deep) 4px,transparent 4px,transparent 8px);
}

.stop-num{
  width:38px; height:38px; border-radius:50%; flex-shrink:0; z-index:1;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:900; color:var(--beige);
  background:var(--brown); border:2px solid var(--beige-dark);
  transition:all 0.3s;
}
.stop-num.delivered{ background:var(--green-dk); }
.stop-num.next{ background:var(--gold-lt); color:var(--brown); animation:nextPulse 2s infinite; }
@keyframes nextPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,144,32,0.4);}50%{box-shadow:0 0 0 8px rgba(196,144,32,0);}}

.stop-card{
  flex:1; background:var(--card); border-radius:14px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 10px rgba(107,76,30,0.08);
  overflow:hidden; transition:all 0.3s;
}
.stop-card.delivered{ opacity:0.5; }
.stop-card.next-card{ border-color:var(--gold-lt); box-shadow:0 4px 20px rgba(196,144,32,0.25); }

/* Card header */
.sc-head{
  padding:11px 13px 8px;
  display:flex; align-items:flex-start; justify-content:space-between; gap:8px;
}
.sc-name{ font-size:14px; font-weight:700; }
.sc-phone{ font-size:11px; color:var(--text-dim); margin-top:2px; }
.sc-badge{
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:3px 9px; border-radius:12px; white-space:nowrap;
  flex-shrink:0;
}
.badge-next{ background:#FFF8E1; color:var(--gold); border:1px solid rgba(196,144,32,0.3); }
.badge-done{ background:#E8F5E9; color:var(--green-dk); }
.badge-open{ background:var(--beige-dark); color:var(--brown); }

/* Card body */
.sc-body{ padding:0 13px 12px; }

.sc-dish{
  font-size:13px; color:var(--text); margin-bottom:8px; line-height:1.6;
}
.sc-dish strong{ color:var(--brown); }

/* Address button */
.sc-addr{
  display:flex; align-items:center; gap:7px;
  background:var(--beige); border:1px solid var(--border);
  border-radius:9px; padding:9px 12px;
  font-size:13px; color:#1565C0; font-weight:700;
  text-decoration:none; margin-bottom:10px;
  transition:all 0.2s;
}
.sc-addr:active{ background:#1565C0; color:white; }
.sc-addr svg{ width:16px; height:16px; flex-shrink:0; }

/* Amount */
.sc-amount{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--card2); border-radius:8px; padding:8px 12px;
  margin-bottom:10px;
}
.sc-amount .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-weight:700; }
.sc-amount .val{ font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:900; color:var(--brown); }
.sc-amount .cash{ font-size:11px; color:var(--gold); font-weight:700; }

/* Action buttons */
.sc-actions{ display:flex; gap:7px; }
.sc-btn{
  flex:1; padding:10px; border-radius:9px; border:none;
  font-size:12px; font-weight:700; cursor:pointer;
  font-family:'Lato',sans-serif; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.btn-delivered{ background:var(--green); color:white; box-shadow:0 3px 12px rgba(37,211,102,0.3); }
.btn-delivered:active{ background:var(--green-dk); transform:scale(0.98); }
.btn-problem{ background:#FFEBEE; color:var(--red); border:1px solid rgba(183,28,28,0.2); }
.btn-undo{ background:var(--beige-dark); color:var(--brown); border:1px solid var(--border); }

/* Empty state */
.empty{ text-align:center; padding:48px 20px; color:var(--text-dim); }
.empty .ic{ font-size:48px; margin-bottom:12px; }

/* ── BOTTOM BAR ── */
.bottom{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--brown); padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 -2px 12px rgba(107,76,30,0.25);
}
.bottom span{ font-size:12px; color:var(--beige-deep); }
.bottom strong{ color:var(--beige); font-size:14px; }
.cash-total{ font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:#FFD54F; }

/* ── TOAST ── */
.toast{
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--brown); color:var(--beige); padding:10px 22px;
  border-radius:24px; font-size:13px; font-weight:700;
  opacity:0; transition:all 0.25s; pointer-events:none; z-index:999; white-space:nowrap;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* Gold strip */
.gold-strip{ height:5px; background:repeating-linear-gradient(90deg,var(--brown) 0,var(--brown) 14px,var(--gold-lt) 14px,var(--gold-lt) 28px); }
</style>
</head>

<script>
const STORAGE_KEY = 'ammas-orders-v1';
const SHIFT_KEY = 'ammas-shift-v1';
const SHIFT_HISTORY_KEY = 'ammas-shift-history-v1';
let shiftData = null; // {startKm, startTime, driverName}
const MINS_PER_STOP = 10;
let orders = [];
let currentDay = 'alle';

// ── LOAD ──
async function load(){
  try{
    const r = window.fbGet ? await window.fbGet(STORAGE_KEY) : await window.storage.get(STORAGE_KEY,true).catch(()=>null);
    if(r&&r.value) orders = JSON.parse(r.value);
  }catch(e){}
  render();
}

async function save(){
  try{
    if(window.fbGet) await window.fbSet(STORAGE_KEY, JSON.stringify(orders));
    else await window.storage.set(STORAGE_KEY,JSON.stringify(orders),true).catch(()=>{});
  }catch(e){}
}

// Live sync
document.addEventListener('firebaseReady', ()=>{
  if(window.fbListen){
    window.fbListen(STORAGE_KEY, (value)=>{
      if(value){ orders=JSON.parse(value); render(); }
    });
  }
});
setTimeout(()=>{ if(!window.firebaseReady) setInterval(load,15000); },3000);

// ── DAY FILTER ──
function setDay(day, btn){
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── ROUTE OPTIMIZATION ──
function optimizeRoute(stops){
  if(stops.length<=1) return stops;
  return [...stops].sort((a,b)=>{
    const pa=(a.address||'').match(/\b(\d{5})\b/);
    const pb=(b.address||'').match(/\b(\d{5})\b/);
    const na=pa?parseInt(pa[1]):99999;
    const nb=pb?parseInt(pb[1]):99999;
    if(na!==nb) return na-nb;
    return (a.address||'').localeCompare(b.address||'');
  });
}

// ── RENDER ──
function render(){
  // Filter by selected driver
  const driverOrders = currentDriver === 'alle'
    ? orders
    : orders.filter(o => !o.fahrer || o.fahrer === currentDriver);
  const allOpen = driverOrders.filter(o=>o.status!=='geliefert');
  const allDone = driverOrders.filter(o=>o.status==='geliefert');

  // Day counts
  const days = ['Montag','Dienstag','Mittwoch','Donnerstag'];
  const ids  = ['Mo','Di','Mi','Do'];
  const allFiltered = currentDay==='alle' ? driverOrders : driverOrders.filter(o=>o.dishes.some(d=>d.day===currentDay));
  document.getElementById('dc-alle').textContent = orders.filter(o=>o.status!=='geliefert').length;
  days.forEach((day,i)=>{
    const el = document.getElementById('dc-'+ids[i]);
    if(el) el.textContent = orders.filter(o=>o.status!=='geliefert'&&o.dishes.some(d=>d.day===day)).length;
  });

  // Get stops for current filter
  const openStops = orders.filter(o=>o.status!=='geliefert'&&(currentDay==='alle'||o.dishes.some(d=>d.day===currentDay)));
  const doneStops = orders.filter(o=>o.status==='geliefert'&&(currentDay==='alle'||o.dishes.some(d=>d.day===currentDay)));
  const optimized = optimizeRoute(openStops);

  // Cash to collect (open only)
  const cashOpen = openStops.reduce((sum,o)=>{
    return sum + (parseFloat((o.price||'0').replace(',','.').replace(' €',''))||0);
  },0);
  const cashDone = doneStops.reduce((sum,o)=>{
    return sum + (parseFloat((o.price||'0').replace(',','.').replace(' €',''))||0);
  },0);

  // Update summary
  document.getElementById('s-open').textContent = openStops.length;
  document.getElementById('s-done').textContent = doneStops.length;
  document.getElementById('s-cash').textContent = cashOpen.toFixed(2).replace('.',',')+' €';
  document.getElementById('b-open').textContent = openStops.length;
  document.getElementById('b-done').textContent = doneStops.length;
  document.getElementById('b-cash').textContent = cashOpen.toFixed(2).replace('.',',')+' €';

  const wrap = document.getElementById('stopsWrap');
  const allStops = [...optimized, ...doneStops];

  if(!allStops.length){
    wrap.innerHTML='<div class="empty"><div class="ic">🎉</div>Alle Bestellungen geliefert!</div>';
    return;
  }

  wrap.innerHTML = allStops.map((o,i)=>{
    const isDone = o.status==='geliefert';
    const isNext = !isDone && i===0;
    const num    = isDone ? '✓' : (i+1);
    const maps   = o.address ? 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(o.address) : '#';
    const dish   = (o.dishes||[]).map(d=>`<strong>${d.portions}×</strong> ${d.dish} <span style="color:var(--text-dim)">(${d.day})</span>`).join('<br>');
    const price  = o.price || '–';

    // Estimated time
    const estMins = i * MINS_PER_STOP;
    const base = new Date();
    if(base.getHours() < 17) { base.setHours(17,0,0,0); }
    base.setMinutes(base.getMinutes() + estMins + MINS_PER_STOP);
    const estTime = base.getHours().toString().padStart(2,'0')+':'+base.getMinutes().toString().padStart(2,'0')+' Uhr';

    return `
    <div class="stop">
      <div class="stop-num ${isDone?'delivered':''} ${isNext?'next':''}">${num}</div>
      <div class="stop-card ${isDone?'delivered':''} ${isNext?'next-card':''}">
        <div class="sc-head">
          <div>
            <div class="sc-name">👤 ${o.name||'–'}</div>
            <div class="sc-phone">${o.phone||''}</div>
          </div>
          <span class="sc-badge ${isDone?'badge-done':isNext?'badge-next':'badge-open'}">
            ${isDone?'✅ Geliefert':isNext?'⭐ Als Nächstes':'#'+(i+1)}
          </span>
        </div>
        <div class="sc-body">
          <div class="sc-dish">${dish}</div>
          ${o.address?`
          <a class="sc-addr" href="${maps}" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            ${o.address}
          </a>`:''}
          <div class="sc-amount">
            <div>
              <div class="lbl">💵 Einzukassieren</div>
              <div class="cash">Barzahlung</div>
            </div>
            <div class="val">${price}</div>
          </div>
          ${!isDone?`
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;text-align:center;">
            ⏱️ Geschätzte Lieferzeit: <strong style="color:var(--brown);">${estTime}</strong>
          </div>
          <div class="sc-actions" style="flex-wrap:wrap;gap:6px;">
            <button class="sc-btn btn-delivered" onclick="markDelivered(${o.id})" style="flex:1;min-width:120px;">
              ✅ Geliefert
            </button>
            <button class="sc-btn" style="flex:1;min-width:100px;background:#FF9800;color:white;" onclick="markLater(${o.id})">
              ⏰ Später
            </button>
          </div>
          <div class="sc-actions" style="flex-wrap:wrap;gap:6px;margin-top:6px;">
            <button class="sc-btn btn-problem" onclick="markScam(${o.id})" style="flex:1;background:#FFEBEE;color:#B71C1C;">
              🚫 Scam
            </button>
            <button class="sc-btn" style="flex:1;background:var(--beige-dark);color:var(--brown);border:1px solid var(--border);" onclick="addComment(${o.id})">
              💬 Kommentar
            </button>
          </div>`:`
          <div class="sc-actions">
            <button class="sc-btn btn-undo" onclick="undoDelivered(${o.id})">
              ↩ Rückgängig
            </button>
          </div>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
async function markDelivered(id){
  if(!shiftData){
    showToast('⚠️ Bitte erst Fahrt starten & KM eintragen!');
    document.getElementById('startKmInput').focus();
    return;
  }
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = 'geliefert';
  o.deliveredAt = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  await save();
  render();
  showToast('✅ Geliefert – weiter zur nächsten!');
}

async function undoDelivered(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = 'unterwegs';
  await save();
  render();
  showToast('↩ Rückgängig gemacht');
}

async function markLater(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = 'neu';
  o.note = 'Später liefern';
  // Move to end of queue
  orders = orders.filter(x=>x.id!==id);
  orders.push(o);
  await save();
  render();
  showToast('⏰ Wird später geliefert');
}

async function markScam(id){
  if(!confirm('Diese Bestellung als Scam markieren?')) return;
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = 'scam';
  o.note = '🚫 Als Scam markiert';
  await save();
  render();
  showToast('🚫 Als Scam markiert');
}

async function addComment(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const comment = prompt('Kommentar hinzufügen:', o.comment||'');
  if(comment === null) return;
  o.comment = comment;
  await save();
  render();
  showToast('💬 Kommentar gespeichert');
}

async function markProblem(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const msg = prompt('Was ist das Problem?\n(z.B. Niemand zu Hause, falsche Adresse...)');
  if(!msg) return;
  o.status = 'problem';
  o.problem = msg;
  await save();
  render();
  showToast('⚠️ Problem gemeldet');
}

// ── OPEN ALL IN MAPS ──
function openAllMaps(){
  const openStops = orders.filter(o=>o.status!=='geliefert'&&(currentDay==='alle'||o.dishes.some(d=>d.day===currentDay)));
  const opt = optimizeRoute(openStops).filter(o=>o.address);
  if(!opt.length){ showToast('⚠️ Keine offenen Lieferungen!'); return; }
  const enc = opt.map(o=>encodeURIComponent(o.address));
  if(enc.length===1){
    window.open('https://www.google.com/maps/search/?api=1&query='+enc[0],'_blank');
  } else {
    let url = `https://www.google.com/maps/dir/?api=1&origin=${enc[0]}&destination=${enc[enc.length-1]}`;
    if(enc.length>2) url += `&waypoints=${enc.slice(1,-1).join('|')}`;
    window.open(url,'_blank');
  }
}

// ── SHIFT / FAHRT SYSTEM ──
async function loadShift(){
  try{
    const r = window.fbGet ? await window.fbGet(SHIFT_KEY) : null;
    return r && r.value ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}

async function saveShift(data){
  if(window.fbSet) await window.fbSet(SHIFT_KEY, data ? JSON.stringify(data) : '');
}

async function startShift(){
  const name = document.getElementById('driverName').value.trim();
  const startKm = parseInt(document.getElementById('startKmInput').value);
  if(!name){ showToast('⚠️ Bitte Namen eingeben!'); return; }
  if(!startKm || startKm < 1){ showToast('⚠️ Bitte Kilometerstand eingeben!'); return; }
  
  shiftData = {
    driverName: name,
    startKm: startKm,
    startTime: new Date().toISOString(),
    startTimeDisplay: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
  };
  await saveShift(shiftData);
  updateShiftUI();
  showToast('🚀 Fahrt gestartet! Gute Fahrt ' + name + '!');
}

async function endShift(){
  if(!shiftData){ showToast('⚠️ Keine aktive Fahrt!'); return; }
  const endKm = parseInt(document.getElementById('endKmInput').value);
  if(!endKm || endKm < 1){ showToast('⚠️ Bitte End-Kilometerstand eingeben!'); return; }
  if(endKm <= shiftData.startKm){ showToast('⚠️ End-KM muss größer als Start-KM sein!'); return; }
  
  const totalKm = endKm - shiftData.startKm;
  const startTime = new Date(shiftData.startTime);
  const endTime = new Date();
  const durationMs = endTime - startTime;
  const durationMin = Math.round(durationMs / 60000);
  const durationH = Math.floor(durationMin / 60);
  const durationM = durationMin % 60;
  
  const deliveredCount = orders.filter(o=>o.status==='geliefert').length;
  const fuelCost = (totalKm * 0.08).toFixed(2); // ~8L/100km, avg 2€/L = 0.16€/km
  
  const shiftResult = {
    ...shiftData,
    endKm,
    totalKm,
    endTime: endTime.toISOString(),
    endTimeDisplay: endTime.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
    durationMin,
    deliveredCount,
    fuelCost,
    date: new Date().toLocaleDateString('de-DE')
  };
  
  // Save to history
  try{
    const r = window.fbGet ? await window.fbGet(SHIFT_HISTORY_KEY) : null;
    const history = r && r.value ? JSON.parse(r.value) : [];
    history.push(shiftResult);
    if(window.fbSet) await window.fbSet(SHIFT_HISTORY_KEY, JSON.stringify(history));
  }catch(e){}
  
  // Clear active shift
  shiftData = null;
  await saveShift(null);
  updateShiftUI();
  
  // Show summary
  showShiftSummary(shiftResult);
}

  modal.style.cssText = 'position:fixed;inset:0;background:rgba(28,16,8,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--beige);border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;">
      <div style="font-size:48px;margin-bottom:8px;">🏁</div>
      <h2 style="font-family:'Playfair Display',serif;color:var(--brown);margin:0 0 4px;">Fahrt beendet!</h2>
      <p style="color:var(--text-dim);font-size:13px;margin:0 0 20px;">${s.driverName} · ${s.date}</p>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--card);border-radius:10px;padding:12px;">
          <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;">Gefahren</div>
          <div style="font-size:1.4rem;font-weight:900;color:var(--brown);">${s.totalKm} km</div>
        </div>
        <div style="background:var(--card);border-radius:10px;padding:12px;">
          <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;">Dauer</div>
          <div style="font-size:1.4rem;font-weight:900;color:var(--brown);">${Math.floor(s.durationMin/60)}h ${s.durationMin%60}m</div>
        </div>
        <div style="background:var(--card);border-radius:10px;padding:12px;">
          <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;">Lieferungen</div>
          <div style="font-size:1.4rem;font-weight:900;color:var(--brown);">${s.deliveredCount}x</div>
        </div>
        <div style="background:var(--card);border-radius:10px;padding:12px;">
          <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;">Benzinkosten</div>
          <div style="font-size:1.4rem;font-weight:900;color:#E53935;">${s.fuelCost} €</div>
          <div style="font-size:10px;color:var(--text-dim);">ca. 8L/100km · 2€/L</div>
        </div>
      </div>
      
      <div style="background:linear-gradient(135deg,var(--brown),var(--gold));border-radius:10px;padding:12px;margin-bottom:16px;">
        <div style="font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:1px;text-transform:uppercase;">Start → Ende</div>
        <div style="font-size:13px;color:white;font-weight:700;">${s.startKm} km → ${s.endKm} km</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.7);">${s.startTimeDisplay} – ${s.endTimeDisplay} Uhr</div>
      </div>
      
      <button onclick="this.closest('[style*=fixed]').remove()" style="width:100%;padding:12px;background:var(--brown);color:var(--beige);border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;">✅ Super, danke!</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function updateShiftUI(){
  const startDiv = document.getElementById('shiftStart');
  const activeDiv = document.getElementById('shiftActive');
  if(shiftData){
    startDiv.style.display = 'none';
    activeDiv.style.display = 'block';
    document.getElementById('shiftStartTime').textContent = shiftData.startTimeDisplay + ' Uhr';
    document.getElementById('shiftStartKmDisplay').textContent = shiftData.startKm + ' km';
  } else {
    startDiv.style.display = 'block';
    activeDiv.style.display = 'none';
  }
}

// Block markDelivered if no active shift
const _origMarkDelivered = typeof markDelivered !== 'undefined' ? markDelivered : null;

let currentDriver = localStorage.getItem('ammas-driver') || 'alle';
const FAHRER_COLORS_APP = ['#4CAF50','#2196F3','#FF9800','#9C27B0','#E91E63'];

function renderDriverButtons(){
  const container = document.getElementById('fahrerBtns');
  if(!container) return;
  // Find how many unique drivers are assigned
  const assignedDrivers = [...new Set(orders.map(o=>o.fahrer).filter(Boolean))].sort();
  const btns = assignedDrivers.length > 0 ? assignedDrivers : ['fahrer1'];
  
  const allBtns = [...btns, 'alle'];
  container.innerHTML = allBtns.map((d,i) => {
    const isActive = d === currentDriver;
    const color = d === 'alle' ? '#B07D2E' : FAHRER_COLORS_APP[parseInt(d.replace('fahrer',''))-1] || '#B07D2E';
    const label = d === 'alle' ? '👁️ Alle' : '🚴 '+d.replace('fahrer','Fahrer ');
    return `<button onclick="selectDriver('${d}')" 
      style="flex:1;min-width:70px;padding:8px 6px;border:2px solid ${color};border-radius:10px;
      background:${isActive?color:'transparent'};color:${isActive?'#1C1008':'white'};
      font-size:12px;font-weight:700;cursor:pointer;text-align:center;">
      ${label}
    </button>`;
  }).join('');
}

function selectDriver(driver){
  currentDriver = driver;
  localStorage.setItem('ammas-driver', driver);
  renderDriverButtons();
  render();
}

// Initialize driver selection on load
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{ renderDriverButtons(); selectDriver(currentDriver); }, 500);
});

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

load().then(()=>renderDriverButtons());
// Load active shift
loadShift().then(s => {
  if(s) { shiftData = s; updateShiftUI(); }
});</script>
